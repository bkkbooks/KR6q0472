body:
  text: 嗣法門人智質智原同編拈古世尊初生拈云特地一場愁雲門一棒拈云不順非孝不奉非輔始見雲門女子出定拈云竊鉤者誅竊國者為諸侯諸侯之門仁義存焉有國者可不慎歟倒卻門前剎竿著拈云兄呼弟應正恁麼時且道門前剎竿曾倒也未諸人於此薦得不惟見過阿難亦且勘破迦葉如或不然箇箇門前壁立千仞世尊於涅槃會上以手摩胸告衆曰汝等善觀吾紫摩金色之身瞻仰取足毋令後悔拈云黃面老子末後播弄一上幸是無人證據一場懡㦬當時資聖若在驀面便唾管取金棺裏更不伸腳世尊因外道問不問有言不問無言云云至如世良馬見鞭影而行法眼益因僧請益云外道問世尊不問有言不問無言聲未絶眼遽約住云住住你擬向世尊良久處會那僧從此悟入拈云且道者僧悟去在世尊良久處不在世尊良久處若在良久處則依舊落他陷阱若不在良久處且道在甚麼處向者裏著得一隻眼不惟勘破者僧許伊氣吞佛祖眼蓋乾坤如若不然作他外道奴有分世尊見文殊在門外立乃曰文殊文殊何不入門來文殊曰我不見一法在門外何以教我入門拈云世尊虎頭蛇尾致令文殊停囚長智資聖當時若見待文殊道我不見一法在門外便攔胸把住道不見一法底是箇甚麼管取至今進退不得岟崛産難因緣拈云尊者持佛語往告而産婦當時分娩雖千佛競出異口同宣莫測其涯量固非神通妙用豈同法爾如然而不知者謂尊者如蟲禦木世尊偶爾成文又何異盲者與以文章之觀聾者與以鐘鼓之聲資聖判斷如此久參上士暗裏驚疑淺學初機明知怪笑世尊坐次見二人舁豬過乃問者箇是什麼二人曰佛具一切智豬子也不識世尊曰也須問過拈云瞿曇大似夫子入太廟殊不知未問前名目已彰但是有口開不得僧問趙州洗鉢盂話云云雲門曰且道趙州有指示無指示若道有且道趙州向伊説甚麼若道無此僧為甚麼悟去雲峰悅云雲門不識好惡大似為蛇添足雲峰則不然此僧恁麼悟去入地獄如箭射拈云看者一對老古錐費盡氣力只解息黥補劓何能起死回生要知者僧悟去趙州也須參三十年始得僧參法眼文益禪師立次師指簾時有僧同去捲師云一得一失拈云福無雙至禍不單行要知二僧自兆法眼既是一家宗匠不合誤賺於人若是資聖不然見其同時捲起只消重教放下無著和尚往臺山與文殊喫茶次殊拈起玻璃盞問南方還有者箇麼師云無殊云尋常將甚麼喫茶師無對洞山代展手又云有無且置借取者箇看得麼拈云洞山老祖大似按圖索馬若是資聖接得便乃撲破不特顯我南方受用不同抑使文殊有口只堪挂壁志公問一梵僧曰承聞尊者喚我作屠兒曾見我殺生否曰見志曰有見見無見見不有不無見見若有見見是凡夫見無見見是聲聞見不有不無見見是外道見未審尊者如何見僧曰你有此等見耶拈云多虛不如少實則不無梵僧要且無佛法道理志公曰終日拈香擇火不知身是道場玄沙別曰終日拈香擇火不知真箇道場昭覺云終日拈香擇火不知拈香擇火拈云三箇老漢秪是貪程不顧腳跟泥水資聖下箇注腳諸人切莫錯會不知身是道場貧兒思舊債不知真箇道場抱贓叫屈不知拈香擇火蝦跳不出斗秪如山僧又作麼生遂拈香云戒香定香解脫香時者云火聻便掌云戊子己丑霹靂火南陽忠國師三喚侍者拈云大小國師向侍者邊討甚消息幸是侍者全無滲漏我負你你負我有屈難伸丹霞見忠國師才展坐具忠云不用不用霞退後三步忠云如是如是霞進前三步忠云不是不是霞一匝而出拈云恁麼相見還當得麼僧問大梅如何是祖師西來意梅曰西來無意鹽官聞乃曰一箇棺材兩箇死漢拈云西來無意千七百則公案俱成戲論若言有意莫謗祖師好者裏著得隻眼鹽官一語瓦解冰消陸亙大夫問南泉石上鐫佛字因緣拈云將謂是箇俗漢善識機宜若不是王老師幾乎錯下雕鐫雖然諸人要識者片石麼切忌鑽龜打瓦夾山因僧問如何是夾山鏡山云猿抱子歸青嶂裏鳥銜花落碧崖前法眼曰我二十年只作境會拈云法眼恁麼道奇特不妨奇特只是失卻一隻眼且道作境會失卻不作境會失卻檢點得出許伊勘破夾山徑山竹篦子話拈云徑山竹篦大似一段鐵橛冷地變作钁頭鍬子霜刃禾鎌汝諸人作麼生理會咄癡人但用便休理會作麼臨濟同普化齋次二度躍倒飯床因緣拈云虎驟龍驤軍中之事何得彼此大驚小怪當時若遇髯將軍一時退身有分僧問寶應遇如何是西來的的大意應云風送泉聲來枕畔月移花影到窗前拈云風泉花月枕畔窗前明取西來的的意且許一半忽然泉枯風息月落花殘看寶應何處出頭雪軒成上堂云白雲萬里卷舒劫外真機紅葉千峰燦爛箇中妙旨入滅舍利無算拈云白雲紅樹特地叫屈何故不見道舌不親他玄旨朱晦菴問天童滅如何是毋不敬滅叉手示之拈云且道未叉手已前毋不敬更在何處萬松示衆云動則埋身千丈不動則當處生苗直須兩頭撒開中間放下更買草鞋行腳始得拈云老漢腳跟點地也未萬松問僧洞山道龍吟枯木異響難聞如何是異響僧云不會松云善解龍吟拈云赤腳人趕兔穿靴人喫肉林泉承旨燒道藏偽經以火炬打圓相云只如三洞靈文還能證此火光三昧麼於斯會得家有北斗經枉教人口不安寧其或未然灰飛煙滅後任教到處覓天尊急著眼看拈云且道後來大明天子獨保底是箇甚麼松庭嚴於寶鏡三昧契入嘗作力田偈曰晝拈塊石驅山鳥曉坐巢菴逐野豚腸斷秋風頻擊柝目窺夜月更消魂拈云與其媚於奧寧媚於灶曲肱而枕之樂亦在其中矣少室改臨沒偈曰吾年八十七出夕復入夕遂坐脫拈云前少室秪解恁麼來後少室秪解恁麼去資聖將來一串穿卻擲向諸人面前如何辨取僧問嵩山斌如何是空劫已前事斌云烏龜向火拈云烏龜向火會到空劫已前事正好五火抄逼殺且道嵩山答處意在於何良久曰參嵩山載示衆云西來直指九鼎單絲汝等諸人打辦箇事直須努力拈云若是箇事作麼生努力如無手人行拳無舌人解語得麼毫釐有差天地懸隔青州辨云二邊純莫立中道不須安且道甚處相見得箇端的拈云手執夜明符幾箇知天曉又云念念釋迦出世步步彌勒下生為甚擬心即錯動念即乖拈云擬心動念達者易知秪如念念釋迦出世步步彌勒下生還乖錯也無具眼者試辨看宗鏡書臨沒偈曰宗鏡宗鏡鏡破宗正擲筆坐化拈云要知一向秪居偏位少室潤參宗鏡鏡舉洞山渠我話詰之潤悟以偈答曰若要見此人有箇真消息無相滿虛空有形沒蹤迹鏡曰子毋勦説須入悟門潤曰尚不借緣從何門入鏡曰不借一句於意云何潤曰彩鳳翻飛身自在鐵牛奔吼意常間拈云吾宗得潤祖海闊天高然不肖遠孫檢點將來猶欠當頭一棒若不點出將謂洞上家風別有奇特大覺念遊初祖面壁處忽然悟入乃云五乳峰前好箇消息大小石頭塊塊著地拈云念祖石頭與生公石頭有同別否良久云要見生公石頭易要見念祖石頭難中峰禪師觀流水有省即詣高峰求證高峰打趕出既而民間訛傳選童男女師因問曰忽有人來與和尚討童男女時如何高峰曰我但度竹篦子與他師於言下大悟拈云竹篦子被高峰一趕直得上窮有頂下透黃泉無立地處驀然撞著露柱燈籠從頭卜算始知厄陽奇數磨蝎臨宮白虎喪門一時弔照幸是無位真人出在面門始終無事中峰悟底放待冷來再看雲門澄詣雲棲棲舉高峰海底泥牛話詰之門推出傍僧云大衆證明棲休去拈云老漢秪有者般伎倆何得聲騰宇宙價重人天雲門澄與黃蘗陶學士向火次陶謂門曰黃蘗師在阿師得力句乞為舉似門云向火背猶寒拈云此是回互語不回互語切忌在向背裏著倒雲門澄因雙髻問如何是殺人刀門云布鼓當軒誰敢擊如何是活人劍門云雖然後學也堪為拈云吾宗語句迥異尋常何必別明尊貴雲門澄升座才立次有老宿出云和尚莫要班門弄斧門與一掌云速道速道宿無對門云死漢拈云將謂千鈞之弩秪是不欺之力僧問愚菴洞山云吾嘗於此切意旨如何菴云老僧二十年亦曾疑著今日被你一問直得口啞拈云老漢雖則用處甚密倘若再被一拶看伊何處躲身居士問愚菴青州布衫菴翹一足拈云翹足伸足客聽主裁要答青州布衫話猶隔趙州關在愚菴到天華請上堂西堂出衆菴曰龍生龍子鳳生鳳兒堂云忙作甚麼菴云話頭安在堂便喝菴云忙作甚麼拈云將謂主賓互換直是頭尾據收若事到劍刃上老漢也須打退鼓始得昔有施主入院行衆僧隨年錢知事僧云聖僧前著一分主云聖僧年多少僧無對代云借施主錢看昔有僧到長者家乞食偶為犬傷長者因問龍披一縷金翅不吞大師全披法服為甚卻被狗咬代云不借他力一喝分賓主目前無闍黎此間無老僧和聲便喝頌照用無前後主賓應歷然山河及大地覿面被相謾渠無我即死我無渠即餘寰中天子塞外將軍頌不同條寧兩賽天安覆地何載將來秪可一坑埋不管諸人會不會入水見長人無人處斫額望汝頌萬象之中何須獨露正眼觀來是甚骨銼世尊睹明星頌潦倒瞿曇客半塗抬眸轉見入淆訛花生捏目重輪現試問今朝悟也無又夢裏惺惺絶未蘇添杯醉後倩人扶承虛腳下遭無限若箇男兒不丈夫又六載吞聲苦抱贓寒星觸眼雪加霜千年滯貨高抬價賣寶波斯泣夜光鐵牛頌觸翻爐韝固雄哉豈墮溈山隊裏來不怕金毛牙爪利天生頭角勢崔嵬日用頌習氣消磨歲月長六窗虛靜露堂堂心心無住方超學錯節盤根大歇場之二性自無生體本真達空迷悟了無因尋常撥轉山河眼水緑山青是舊人超方頌卓錐無地進竿頭逆上須彌跨鐵牛撲破鏡臺俱不立斷頭船子下揚州之二一劍磨來已十年不存魔佛貴天然癡人猶望豐城氣眨眼眉間血濺天古德吃油餈老婆傅粉足堪誇愛插花枝雲鬢斜惹得遊蜂來滿面徒貪香汗失歸家無夢無想主人公百戰忘軀建巨功興亡帝業付冥鴻從今名姓埋天下不獨嚴光拜下風僧問雲門如何是超佛越祖之談門云胡餅洞庭波上釣魚舟雨雨風風又幾秋衝浪錦鱗曾點額莫貪香餌上鉤頭本來面目本來面目未生前夾岸桃花紅欲然自是漁郎無路入卻疑不是舊山川又奇哉固奇廓然原廓一點不來兩下俱錯臘八指點長庚又一年無端鼻孔被人牽今朝更入泥犁去大地何人救得全又冷風撲面蹙雙眉夜半無人鱉證龜賺殺男兒多意氣一狐疑了一狐疑趙州柏樹子話拈趙州被者僧一問不向柏樹子裏躲身幾被者僧勘破檢點將來不免依草附木今日若有人問只對他道次滅紙燈剛夜半大家齊向暗中行頌好峰何事絶人遊緑滿林皋紅滿洲開到牡丹容似雪洞賓嘗醉嶽陽樓洞山麻三斤話拈洞山平地上慣撒鐵蒺藜陷殘兵敗馬自稱好手不消屾峰一拶看伊瓦解冰消雖然心不負人面無慚色石梯問侍者上堂齋去話拈石梯撥草尋蛇侍者臨危不變不謬為吾侍者憐兒不覺醜到底不免淆訛且道上堂齋去畢竟當得本分事麼具眼者試甄別看麻谷到章敬繞禪床三匝振錫一下卓然而立敬云是是雪竇云錯麻谷又到南泉亦如是泉云不是不是雪竇云錯麻谷當時云章敬道是為甚麼和尚道不是泉云章敬即是是汝不是此是風力所轉終成敗壞拈云麻谷到處擔枷過狀不顧危亡二老漢雖則坐觀成敗要且抬搦不同諸人還會雪竇兩錯麼且道是雙放雙收耶自倒自起耶妙覺今日也下箇錯字要與麻谷出氣良久云點石化為金玉易勸人除卻是非難
