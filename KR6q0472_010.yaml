body:
  text: 嗣法門人智質智原同閲雜著橫山淨土詩序原夫淨土惟心心淨則土無不淨圓修即性性圓則修無不圓斯淨圓之性生佛同原覺迷一致但悟之則聖量都融昧之則凡情兢起于是前聖聿興禪淨爰立證修提單傳直指當人在自肯而乃方親攝一念橫超果地離諸緣而始受用墜腰斷臂惟知重法忘軀離句絶非抑見明宗合教洵夫道契真乘讖符大器者矣今則濫膺祖牒象狐莫辨于盲群穢廁僧倫鍾釜難分于聵衆寧不慨歟茲吾橫山冰如禪宿髫年入道皓首成功三十載足不踰閫十萬聲晝夜無間喃喃吐偈盡廣長之溪聲歷歷孤明即清淨之山色詎非道由一貫德被三根契理契機法法原明向上全修全性頭頭不昧本來以致刻期告衆隨念往生緇白固以欽崇禪淨因之歸一俾心燈焰續愈光先德之風竺土名標振啓後昆之弊本懷暢于斯卷淺陋申于短言用施剞劂裨助津梁力勉真修公諸同事云爾東山丈室銘序汾陽無業禪師曰看他古德道人得意之後茅茨石室向折腳鐺中煮飯喫過三二十年名利不干懷財寶不為念大忘人世隱迹巖叢君王命而不來諸侯請而不赴豈同我輩貪名愛利汩沒世塗如短販人有少希求而忘大果妙喜曰灼然兄弟那時早有如此説話也更教他見我輩如今做處也好慚惶殺人看他二大知識法中龍象人天眼日真龍天推出接物利生尚以此言推重韜光晦迹者不以利物自居要知終身居深山是非等間人所能為稍有動念塵勞萌心名利縱然勉強終成逗漏此間山深溪遠林邃境幽淨案明窗清茶白粥經年無事縈懷真可安貧樂道較他古人已是十倍受用不可不知足安分雖室中親依少人當自念薄福所致慎勿嫌山深路僻況古之得道人單丁獨處載録燈傳者頗不少法昌遇一力撾鼓亮座主終老西山隱山自焚茅屋懶殘不暇拭涕吾祖芙蓉和尚忤旨加刑怡然順受迫念古人慚愧多矣謹書座右深自勉旃耿道符先生詩序古之言詩者蓋以敦德性修品節為重而風雅隨之煉詞琢句考聲合度皆漢魏齊梁之緒餘也讀三百篇知雅頌各得其所非至性中流出能為萬世法乎昔人論詩譬諸禪以頓漸大小諸乘例詩盛衰余則不然其説禪有頓無漸修有漸無頓頓漸之道惟悟能知而門外漢以詩論禪大有徑庭論者不知也然詩之為法以性靈為旨靜理為趣山川人物禽魚草木悉我性靈中物喜怒哀樂言行品節本我性靈之全體既得性靈之全者則何禪之不在我耶道符耿先生為三韓開國靖南王嫡裔忠敏王之孫額駙愨敏公之大嗣君出自和碩柔嘉公主聰睿靜默寬裕簡重雖榮寵當世而車服素約與世淡如也燕居無事喜嘗為詩精粹秀拔超然雋逸筆下無半點塵有高岑王孟之風所謂胸中固有而發乎性靈者在是矣試觀今之登樂府趨騷壇者概不與之較量故不輕出示人其處世應物之暇與浮屠氏若有夙契醉心禪悅早知有向上事宗門關鍵透脫古今即禪者相對無敢攖其鋒然虛容不少露豫謂果地之再來人洵不誣也庚午夏余屢過私第憩書齋以手編所作諸什若干篇出示捧讀之餘每思屬和但愧匪材故舉夫德性品節之説而附諸篇末以垂不朽焉仁壽天逸和尚重修塔碑記自達磨西來不傳之旨發明震旦蓋千有二百年其間法道盛衰不知有幾而慧命所關惟係乎人人為載道之器得人其道光且大不得人其道不弘非道之有隱顯而實載道之人之為重也由是觀震旦五葉之裔班班燈録者皆間世偉人非等間用世之才所能及古來立言治世特達之士日浮屠氏限于因果罪福小乘之説未嘗深究心宗窮研教理無怪其所見異同即信從者亦未必皆具真知實見耳宋出大儒發明聖學雖以孔孟門墻自立而一著透脫處不出乎吾宗不傳之旨蓋浮屠氏之有補于名教益明矣但今禪道遍天下去聖日遙風斯下趨力愧不能挽良可慨也緬惟前賢芳躅既不可追而近代偉人愚以濟下天逸和尚為法門載道重器足稱後昆師表師早歲參夾山報恩兩和尚後入夾山之室孤風峻拔卓立諸方于某年間駐錫都門戒壇仁壽二剎王公敬信緇素皈依三韓耿大護法栴林公靖南王嫡裔深信宗乘早契心要現身勛貴乘願金湯弱歲禮師座下為弟子有年末後無縫合尖皆栴林公之力也余過私第盤桓日久及師往事切慕師之道行宗風因出所藏行述請爾為之記師諱本圓號天逸昭陽張氏子生而英拔智識過人幼具出塵之志弱冠遊燕歸即棄家求道詣參知識丙戌春過維揚東隱菴見玉如大師求度如喜師器宇不群復慮其世緣未斷不允懇之再四方得脫白遂掩關閲楞嚴經如叩關問師經云纍劫多聞不如一日修無漏業師不明厥旨如命師出關往參夾山箬菴和尚師見箬問某甲生死不明乞師指示箬便打師禮拜箬又打自此疑情頓起寢食俱忘箬命為侍者師愈加精進箬于稠人中指曰此子他日磬室之光明幢也後參報恩玉林和尚隨衆打七正提話頭玉將香板擲地作聲師由此悟入玉對衆曰爾輩參學能似者鐵橛子方有少分相應後箬移磬山師歸省箬便問汝從報恩來還解報恩也未師曰粉骨碎身未足酬一句了然超百億箬曰如何是了然一句師曰適來秖對和尚箬曰老僧不曾聽得師擬進語箬連棒打出一日箬舉世尊拈花命頌衆退思師立頌上苑笙歌早蛾眉脂粉多臨粧添一笑失卻舊山河箬頷之緣師親受深錐痛拶有年機辨縱橫默許可書偈曰世界原同古鏡闊火爐特地解翻身因是嫡骨相承者將此深心奉塵剎并衣拂源流囑師師拜受辭歸東隱未幾聞箬菴和尚示寂師大慟哭擬奔喪因病遂止服心喪事畢尋往五祖謁同門千仞和尚盤桓纍日臨行千有堪笑先師無剩物秖留一頂舊袈裟之句送師東歸于某年之都門掃嘯翁塔戒壇文公重師道行請師卓錫自後移住仁壽寺凡上堂入室提唱宗風奔走請益者日無虛晷即飽參宿學靡不嘆服真法門之柱石克振濟上家聲于勿替也師平生與洞宗佛光和尚交最深一日光至師喜曰吾緣盡矣遂擇日至期聞鐘聲趺坐趨寂闍維獲五色堅固子道俗競分供養師生于萬曆己未九月十五日入寂于康熙戊申七月十三日世壽五十臘二十一建塔于西山天台寺大南峪之麓茲因年遠靈塔頽廢弟子耿旃林公發心募資重為修建復其舊觀成不朽事銘曰法流茲土誕生偉人為光明幢結大地春楊岐嫡脈磬室真子大道斯存恰秖者是窣堵重扶卓立雲際不涉春秋撑天拄地松杉環蔭雲山縹眇瞻之仰之為人天表客窗贅語吾人胸中不能變化容物動處便成執礙頓生人我皆少學問力耳少學問不是做詩做文字不得做甚些小事便見學問深淺此學問不從文字上學來竟是夙生帶來的所以行時處處便到若從書上看來有書看不到則所行學問有時有有時無便有缺陷偏枯處因是知千古聖賢大經大傳是吾胸中先有讀時不過讀自己的説個溫故知新已落第二義了宗門道佛法向自己胸中流出始能蓋天蓋地此語若合符契如此何古之聖賢先獲我心俾我甘居後塵不能並驅千古為恨耳題璞菴禪師茅屋卷今之出世者始則脫離塵網而卒復攖世諦作泛泛庸緇雖稱釋種而仍俗鄙也知者不然如壯夫展臂師子遊行伴侶不求奚藉他力豈泛泛者能測量哉璞公三間茅屋坐破蒲團我故知其不妄也昔隱山有三間茅屋從來住一道神光萬境間莫把是非來辨我平生穿鑿不相關焚之而去璞公抑得此意否惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂古人往矣我將奚問焉質諸璞公為之頤解題施憲章居士盆中樹石結廬在人境而無車馬喧晉淵明詩也讀其詩知其人千古罕得特胸次無物耳夫人生世間日與物處未嘗不為物纍與物處不為物纍讀聖賢書則近之否則欲避車馬喧已染林泉癖問所為胡來胡現漢來漢現本來空洞元明何在也我于水北憲章施子得之施子處于闤闠門徑雖不越俗而胸次別有一天居嘗篤孝友睦鄰戚盛年有長者風相對淡如儼心遊于物初者豫偶過齋頭見其盆盎滿架花石盈庭片山寸樹淡遠古雅摹倣出宋元諸家之右非復吳下阿蒙刻畫手噫技進矣施子入乎其齋而嗒然忘我不知身在市囂湫隘中出乎其齋而蕭然無物不知志在摹石叢篁內直欲空天地間一切往來得喪超乎與造物者遊又何一物之足為纍也吾于施子有厚望焉募大悲像疏此方教體只在音聞衆生聞大士名號如雷入耳寤寐不忘此其驗也若乃睹相生信能令衆生瞻禮嘆仰則像教之益可勝量哉海音上座久栖林下多經寒暑方將覓一座具地作把茅計床座之外期設大悲像供事之余曰子尚無個住處安用像為曰不然古人謂古鏡闊一丈則火爐闊一丈像現則大地現矣又如某椰子一軀始終不離堂搆況大士法身全露而翻令飄搖風雨中耶豫合瓜贊善曰許子具一隻眼即説偈曰法身現時大地現塵剎世界亦復然譬如心王及心所一念具足同現前南嶽僧募方册大藏引世尊四十九年不曾説著一字非掃蕩言詮乃言詮不能到也古德云一大藏教是個注腳且道注腳個甚麼這裏透去不被注腳轉方許途中受用南嶽山頭興雲浙江地面下雨東海龍王也須吃棒為甚嘉禾城中大藏不肯動著佛法到此殊不靈驗敢告吾禾檀越之知音者決能別通消息則某之言又成注腳添足矣題募米疏六贊禪人者乃叢林頭陀苦行僧也嘗跪誦金剛法華諸典集若有驗而口終不為之啓人謂之木訥而彼為之喜誦持輒無他想惟念叢林以飯僧為大佛事凡一舉不如願不假歸昨乞武水獲粟若干復欲他往豫曰子既得隴何更望蜀耶贊禪曰心如墻壁可以入道而況茲一小因緣索册便行豫佳其猛烈為衆即書此以授之蘆溝橋募建茶棚施茶湯引蘆溝橋者乃都會之通衢士人商賈往來暑寒不輟車馬負戴雜沓晝夜無分一行數十里仍乏小歇場蓋有年矣茲江南願山上人審行人也慨發難行心欲豎精進幢于斯地冬則暖湯禦寒要使寒時發焰暑則清涼除熱管教熱處生冰趙州公案與保壽同參雲門鋪面待清平合拍苦釅茶澆開肺腑一滴清涼辣薑湯暖生腸肚半餉消寒願力如山始信當人自肯福田似海豈道阿誰無分幸得卓錐有地仰皇圖普載之恩但今片瓦未成賴檀信傾囊之施茶棚頓舉廣結萬緣寶所漸成全憑衆手福利之因無煩饒舌是引
